name: Publish to npm

# Fires when a GitHub release is published (i.e. you click "Publish release"
# on a draft built by the Release workflow). At that point all assets are
# downloadable, so the npm wrapper's postinstall download will succeed.
#
# Manual `workflow_dispatch` is also available from the Actions tab if you
# ever need to re-publish a specific tag without going through GitHub's UI.

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: 'https://registry.npmjs.org'

      - name: Publish xshell-app to npm
        working-directory: ./npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
